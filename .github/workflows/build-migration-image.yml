name: Build & Push Database Migration Image

on:
  push:
    branches:
      - main
    paths:
      - 'database/**'
      - '.github/workflows/build-migration-image.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even without changes'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sipap-migrations
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build Migration Image + Push to ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SIPAP_DEV_AWS_ROLE_ARN }}
          role-session-name: sipap-migrations-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity
          echo "AWS Region: $AWS_REGION"
          echo "ECR Repository: $ECR_REPOSITORY"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Migration Image
        working-directory: database
        run: |
          echo "=============================================="
          echo "Component:   Database Migrations"
          echo "Environment: Development"
          echo "Image Tag:   ${IMAGE_TAG}"
          echo "Platform:    linux/amd64 (ECS Fargate compatible)"
          echo "=============================================="

          # Get ECR repository URL
          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names ${ECR_REPOSITORY} \
            --query 'repositories[0].repositoryUri' \
            --output text | cut -d'/' -f1)

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Building image: ${IMAGE_URI}"

          # Build for amd64 platform (ECS Fargate architecture)
          docker buildx build \
            --platform linux/amd64 \
            --tag ${IMAGE_URI} \
            --push \
            .

          echo "✅ Successfully built and pushed: ${IMAGE_URI}"

      - name: Get Image Digest
        id: image-digest
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name ${ECR_REPOSITORY} \
            --image-ids imageTag=${IMAGE_TAG} \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "ERROR: Could not resolve digest for ${ECR_REPOSITORY}:${IMAGE_TAG}"
            exit 1
          fi

          echo "Resolved digest: $DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Force Update ECS Task Definition
        run: |
          set -e  # Exit on any error

          echo "Forcing new ECS task definition revision..."

          # Get current task definition (suppress all None output)
          TASK_DEF_ARN=$(aws ecs list-task-definitions \
            --family-prefix sipap-dev-migrations \
            --sort DESC \
            --max-items 1 \
            --query 'taskDefinitionArns[0]' \
            --output text 2>&1 | grep -v "^None$" | head -1)

          if [ -z "$TASK_DEF_ARN" ] || [ "$TASK_DEF_ARN" = "None" ]; then
            echo "⚠️  No existing task definition found. Skipping update."
            echo "ℹ️  Run 'terraform apply' to create the task definition."
            exit 0
          fi

          echo "Current task definition: $TASK_DEF_ARN"

          # Get task definition JSON (write to temp file to avoid None output)
          TEMP_FILE=$(mktemp)
          aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition' \
            --output json > "$TEMP_FILE" 2>&1

          # Validate JSON was retrieved
          if [ ! -s "$TEMP_FILE" ]; then
            echo "❌ ERROR: Failed to retrieve task definition details"
            rm -f "$TEMP_FILE"
            exit 1
          fi

          # Remove task definition metadata fields
          jq -c 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' "$TEMP_FILE" > "${TEMP_FILE}.new"

          # Validate processed JSON
          if [ ! -s "${TEMP_FILE}.new" ]; then
            echo "❌ ERROR: Failed to process task definition JSON"
            rm -f "$TEMP_FILE" "${TEMP_FILE}.new"
            exit 1
          fi

          # Register new revision
          echo "Registering new task definition revision..."
          RESULT=$(aws ecs register-task-definition \
            --cli-input-json "file://${TEMP_FILE}.new" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text 2>&1 | grep -v "^None$" | head -1)

          # Cleanup temp files
          rm -f "$TEMP_FILE" "${TEMP_FILE}.new"

          if [ -z "$RESULT" ] || [ "$RESULT" = "None" ]; then
            echo "❌ ERROR: Failed to register new task definition revision"
            exit 1
          fi

          echo "✅ New task definition revision registered: $RESULT"

      - name: Build Summary
        run: |
          echo "### 🚀 Database Migration Image Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Component** | Database Migrations |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Tag** | \`${IMAGE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Digest** | \`${{ steps.image-digest.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **ECR Repository** | \`${ECR_REPOSITORY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platform** | \`linux/amd64\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered By** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | ✅ Build Success |" >> "$GITHUB_STEP_SUMMARY"

  run-migration:
    name: Run Database Migration
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SIPAP_DEV_AWS_ROLE_ARN }}
          role-session-name: sipap-migrations-run
          aws-region: ${{ env.AWS_REGION }}

      - name: Get VPC Configuration
        id: vpc-config
        run: |
          echo "Getting VPC configuration from AWS..."

          # Get VPC ID
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=sipap-dev-vpc" \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "❌ ERROR: Could not find VPC with tag Name=sipap-dev-vpc"
            exit 1
          fi
          echo "✅ VPC ID: $VPC_ID"

          # Get private subnets
          PRIVATE_SUBNETS_RAW=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=*private*" \
            --query 'Subnets[*].SubnetId' \
            --output text 2>/dev/null)
          PRIVATE_SUBNETS=$(echo "$PRIVATE_SUBNETS_RAW" | tr '\t' ',' | tr -d '\n')

          if [ -z "$PRIVATE_SUBNETS" ] || [ "$PRIVATE_SUBNETS" = "None" ]; then
            echo "❌ ERROR: Could not find private subnets in VPC $VPC_ID"
            exit 1
          fi
          echo "✅ Private Subnets: $PRIVATE_SUBNETS"

          # Get ECS tasks security group
          DB_SG=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=sipap-dev-ecs-tasks-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null)

          if [ -z "$DB_SG" ] || [ "$DB_SG" = "None" ]; then
            echo "❌ ERROR: Could not find security group with tag Name=sipap-dev-ecs-tasks-sg"
            exit 1
          fi
          echo "✅ Security Group: $DB_SG"

          # Get task definition ARN
          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix sipap-dev-migrations \
            --sort DESC \
            --max-items 1 \
            --query 'taskDefinitionArns[0]' \
            --output text 2>/dev/null)

          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
            echo "❌ ERROR: Could not find task definition with family sipap-dev-migrations"
            exit 1
          fi
          echo "✅ Task Definition: $TASK_DEF"

          # Validate all values before exporting
          echo "✅ All VPC configuration values retrieved successfully"

          # Export to outputs (safe now - all validated)
          echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
          echo "private_subnets=$PRIVATE_SUBNETS" >> "$GITHUB_OUTPUT"
          echo "security_group=$DB_SG" >> "$GITHUB_OUTPUT"
          echo "task_definition=$TASK_DEF" >> "$GITHUB_OUTPUT"

      - name: Run Migration Task
        id: run-task
        run: |
          echo "=============================================="
          echo "Running Database Migration ECS Task"
          echo "=============================================="
          echo "Cluster: sipap-dev-cluster"
          echo "Task Definition: ${{ steps.vpc-config.outputs.task_definition }}"
          echo "Subnets: ${{ steps.vpc-config.outputs.private_subnets }}"
          echo "Security Group: ${{ steps.vpc-config.outputs.security_group }}"
          echo "=============================================="

          # Run ECS task
          TASK_ARN=$(aws ecs run-task \
            --cluster sipap-dev-cluster \
            --task-definition ${{ steps.vpc-config.outputs.task_definition }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.vpc-config.outputs.private_subnets }}],securityGroups=[${{ steps.vpc-config.outputs.security_group }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "❌ ERROR: Failed to start ECS task"
            exit 1
          fi

          echo "✅ Migration task started: $TASK_ARN"
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

          # Extract task ID for log filtering
          TASK_ID=$(echo $TASK_ARN | awk -F'/' '{print $NF}')
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Migration Completion
        id: wait-task
        run: |
          echo "Waiting for migration task to complete..."
          TASK_ARN="${{ steps.run-task.outputs.task_arn }}"

          # Wait for task to complete (timeout: 10 minutes)
          for i in {1..60}; do
            TASK_STATUS=$(aws ecs describe-tasks \
              --cluster sipap-dev-cluster \
              --tasks $TASK_ARN \
              --query 'tasks[0].lastStatus' \
              --output text)

            echo "[$i/60] Task status: $TASK_STATUS"

            if [ "$TASK_STATUS" = "STOPPED" ]; then
              echo "✅ Task completed"
              break
            fi

            if [ $i -eq 60 ]; then
              echo "❌ ERROR: Task did not complete within 10 minutes"
              exit 1
            fi

            sleep 10
          done

          # Get exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster sipap-dev-cluster \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Get stopped reason (if any)
          STOPPED_REASON=$(aws ecs describe-tasks \
            --cluster sipap-dev-cluster \
            --tasks $TASK_ARN \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "stopped_reason=$STOPPED_REASON" >> "$GITHUB_OUTPUT"

      - name: Get Migration Logs
        if: always()
        run: |
          echo "Fetching migration logs from CloudWatch..."

          # Wait a few seconds for logs to be available
          sleep 5

          # Get logs (last 100 lines)
          aws logs tail /ecs/sipap-dev-migrations \
            --since 15m \
            --format short \
            --filter-pattern "${{ steps.run-task.outputs.task_id }}" || true

      - name: Check Migration Status
        run: |
          EXIT_CODE="${{ steps.wait-task.outputs.exit_code }}"
          STOPPED_REASON="${{ steps.wait-task.outputs.stopped_reason }}"

          echo "=============================================="
          echo "Migration Task Results"
          echo "=============================================="
          echo "Exit Code: $EXIT_CODE"
          echo "Stopped Reason: $STOPPED_REASON"
          echo "=============================================="

          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ Database migration completed successfully!"
            exit 0
          else
            echo "❌ Database migration failed with exit code: $EXIT_CODE"
            echo "Stopped Reason: $STOPPED_REASON"
            exit 1
          fi

      - name: Migration Summary
        if: always()
        run: |
          EXIT_CODE="${{ steps.wait-task.outputs.exit_code }}"
          TASK_ARN="${{ steps.run-task.outputs.task_arn }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🗄️ Database Migration Execution" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Task ARN** | \`$TASK_ARN\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Exit Code** | \`$EXIT_CODE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **CloudWatch Logs** | [View Logs](https://console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}#logsV2:log-groups/log-group/\$252Fecs\$252Fsipap-dev-migrations) |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$EXIT_CODE" = "0" ]; then
            echo "| **Status** | ✅ Success |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| **Status** | ❌ Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi
